name: 'Init Volcano Engine CLI'
description: 'Install and configure volc CLI for GitHub Actions'
inputs:
  access_key:
    description: 'Volcano Engine Access Key ID'
    required: true
  secret_key:
    description: 'Volcano Engine Secret Access Key'
    required: true
  region:
    description: 'Default region (e.g., cn-shanghai)'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Verify secrets are available
      run: |
        if [ -z "$REGION" ] || [ ${#ACCESS_KEY} -eq 0 ] || [ ${#SECRET_KEY} -eq 0 ]; then
          echo "❌ 密钥校验失败，请完善配置 settings --> environments！"
          exit 1
        else
          echo "✅ 密钥校验成功！"
        fi
      env:
        ACCESS_KEY: ${{ inputs.access_key }}
        SECRET_KEY: ${{ inputs.secret_key }}
        REGION: ${{ inputs.region }}
      shell: bash
    - name: Install volc CLI
      shell: bash
      run: |
        echo "🚀 Installing volc CLI..."
        echo y | sh -c "$(curl -fsSL https://ml-platform-public-examples-cn-beijing.tos-cn-beijing.volces.com/cli-binary/install.sh)"
        # 将 CLI 路径永久加入 PATH（后续步骤生效）
        echo "$HOME/.volc/bin" >> $GITHUB_PATH
        echo "✅ Installation completed."

    - name: Verify installation
      shell: bash
      run: |
        if ! volc version &>/dev/null; then
          echo "❌ volc CLI installation failed."
          exit 1
        fi
        echo "✅ volc version: $(volc version)"

    - name: Configure volc CLI
      shell: bash
      env:
        ACCESS_KEY: ${{ inputs.access_key }}
        SECRET_KEY: ${{ inputs.secret_key }}
        REGION: ${{ inputs.region }}
      run: |
        set -e
        echo "🔧 Configuring volc CLI..."

        # 确保配置目录存在
        mkdir -p .github/config/volc $HOME/.volc

        # 创建volc/credentials默认模板
        echo "[default]" > .github/config/volc/credentials
        echo "access_key_id     = 1234" >> .github/config/volc/credentials
        echo "secret_access_key = 12345" >> .github/config/volc/credentials
        # 创建volc/config默认模板
        echo "[default]" > .github/config/volc/config
        echo "region       = 1234" >> .github/config/volc/config
        echo "auto_upgrade = false" >> .github/config/volc/config
        echo "" >> .github/config/volc/config
        echo "[ml_platform]" >> .github/config/volc/config

        # 替换 credentials 中的密钥
        sed -i.bak \
          -e "s/^access_key_id[[:space:]]*=.*/access_key_id     = ${ACCESS_KEY}/" \
          -e "s/^secret_access_key[[:space:]]*=.*/secret_access_key = ${SECRET_KEY}/" \
          .github/config/volc/credentials

        # 替换 config 中的区域
        sed -i.bak "s/^region[[:space:]]*=.*/region = ${REGION}/" .github/config/volc/config

        # 复制配置文件到 $HOME/.volc/credentials（volc CLI 默认读取位置）
        echo $HOME
        cp .github/config/volc/credentials .github/config/volc/config $HOME/.volc/
        cat $HOME/.volc/config
        # 清理备份文件（可选）
        rm -f .github/config/volc/credentials.bak .github/config/volc/config.bak

        echo "✅ volc CLI configured successfully."
    